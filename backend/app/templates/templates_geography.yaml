templates:

  # ============================================================
  # KNOWLEDGE MCQ  (4 templates — no assets needed)
  # ============================================================

  - id: geog_troposphere_basic_v1
    subject: geography
    unit: weather
    skill: geog.weather.troposphere
    difficulty: 1
    type: multi_choice
    prompt: "Which statement about the troposphere is correct?"
    parameters:
      distractors:
        gen: geog_knowledge_mcq
        topic: troposphere
    assets: []
    marking:
      mode: mcq
    solution:
      steps:
        - "The troposphere is the layer closest to Earth where weather forms."

  - id: geog_depression_weather_v1
    subject: geography
    unit: weather
    skill: geog.weather.depressions
    difficulty: 2
    type: multi_choice
    prompt: "A depression (low pressure) moves over the UK. What weather is most likely?"
    parameters:
      distractors:
        gen: geog_knowledge_mcq
        topic: depression
    assets: []
    marking:
      mode: mcq
    solution:
      steps:
        - "Low pressure means rising air, clouds and rain."

  - id: geog_climate_impacts_v1
    subject: geography
    unit: climate
    skill: geog.climate.impacts
    difficulty: 3
    type: multi_choice
    prompt: "A place has long, cold winters and short summers. Which impact is most likely?"
    parameters:
      distractors:
        gen: geog_knowledge_mcq
        topic: climate_impacts
    assets: []
    marking:
      mode: mcq
    solution:
      steps:
        - "Climate affects what can grow and how people travel, work and build homes."

  - id: geog_heatwave_safety_v1
    subject: geography
    unit: climate
    skill: geog.climate.heatwaves_safety
    difficulty: 2
    type: multi_choice
    prompt: "During a heatwave, which action is safest?"
    parameters:
      distractors:
        gen: geog_knowledge_mcq
        topic: heatwave
    assets: []
    marking:
      mode: mcq
    solution:
      steps:
        - "Heatwaves increase the risk of dehydration and heat illness."
        - "Shade, hydration and lighter activity help."

  # ============================================================
  # MATCHING / GRID-FILL  (6 templates)
  # ============================================================

  - id: geog_weather_instruments_match_v1
    subject: geography
    unit: weather
    skill: geog.weather.instruments
    difficulty: 2
    type: grid_fill
    prompt: "Match each weather instrument to what it measures."
    parameters:
      pairs:
        gen: instruments_set
        pick: 5
    assets:
      - kind: matching_cards
        id: inst1
        left_label: "Instrument"
        right_label: "Measures"
        pairs_from: pairs
    marking:
      mode: grid_match
    solution:
      steps:
        - "Remember: barometer = air pressure, anemometer = wind speed, wind vane = wind direction."

  - id: geog_uk_air_masses_match_v1
    subject: geography
    unit: weather
    skill: geog.weather.uk_air_masses
    difficulty: 4
    type: grid_fill
    prompt: "Match each UK air mass to its typical weather."
    parameters:
      pairs:
        gen: uk_air_masses_set
        pick: 4
    assets:
      - kind: matching_cards
        id: airmass1
        left_label: "Air mass"
        right_label: "Typical weather"
        pairs_from: pairs
    marking:
      mode: grid_match
    solution:
      steps:
        - "Maritime air masses are usually wetter."
        - "Continental air masses are usually drier."

  - id: geog_cloud_types_match_v1
    subject: geography
    unit: weather
    skill: geog.weather.cloud_types
    difficulty: 2
    type: grid_fill
    prompt: "Match each cloud type to its description."
    parameters:
      pairs:
        gen: cloud_set
        pick: 3
    assets:
      - kind: matching_cards
        id: cloud1
        left_label: "Cloud type"
        right_label: "Description"
        pairs_from: pairs
    marking:
      mode: grid_match
    solution:
      steps:
        - "Cumulus: fluffy heaps."
        - "Stratus: flat layers."
        - "Cirrus: wispy high clouds."

  - id: geog_map_symbols_match_v1
    subject: geography
    unit: maps
    skill: geog.maps.map_symbols
    difficulty: 2
    type: grid_fill
    prompt: "Match each map symbol to what it represents."
    parameters:
      pairs:
        gen: symbol_set
        pick: 5
    assets:
      - kind: matching_cards
        id: symkey1
        left_label: "Symbol"
        right_label: "Meaning"
        pairs_from: pairs
    marking:
      mode: grid_match
    solution:
      steps:
        - "Look at each symbol's shape."
        - "Match it to the correct meaning in the list."

  - id: geog_water_cycle_label_v1
    subject: geography
    unit: weather
    skill: geog.weather.water_cycle
    difficulty: 2
    type: grid_fill
    prompt: "Match each water cycle process to its description."
    parameters:
      pairs:
        gen: water_cycle_set
        pick: 4
    assets:
      - kind: matching_cards
        id: wc1
        left_label: "Process"
        right_label: "Description"
        pairs_from: pairs
    marking:
      mode: grid_match
    solution:
      steps:
        - "Evaporation: liquid water to vapour."
        - "Condensation: vapour to droplets (clouds)."
        - "Precipitation: rain, snow or hail falls."

  - id: geog_continents_oceans_v1
    subject: geography
    unit: world
    skill: geog.world.continents_oceans
    difficulty: 1
    type: grid_fill
    prompt: "Match each continent or ocean to its description."
    parameters:
      pairs:
        gen: continents_oceans_set
        pick: 6
    assets:
      - kind: matching_cards
        id: world1
        left_label: "Name"
        right_label: "Description"
        pairs_from: pairs
    marking:
      mode: grid_match
    solution:
      steps:
        - "There are 7 continents and 5 oceans."
        - "Match each label to the correct description."

  # ============================================================
  # SCALE CALCULATIONS  (2 templates)
  # ============================================================

  - id: geog_scale_real_distance_v1
    subject: geography
    unit: maps
    skill: geog.maps.scale_distance
    difficulty: 3
    type: numeric
    prompt: "The map has a scale of {scale_text}. The straight-line distance between A and B on the map is {map_cm} cm. What is the real distance in km?"
    parameters:
      scale:
        gen: map_scale
      scale_text:
        gen: from_object
        object: scale
        field: text
      map_cm:
        gen: decimal
        range: { min: 1.5, max: 8.0 }
        dp: 1
    assets:
      - kind: scale_bar
        id: scalebar1
        ratio_from: scale.ratio
    marking:
      mode: numeric_tolerance
      tolerance: 0.02
    solution:
      steps:
        - "Convert the map distance to a real distance using the ratio."
        - "Change cm to km."
    calculator: basic

  - id: geog_scale_map_distance_v1
    subject: geography
    unit: maps
    skill: geog.maps.scale_map_distance
    difficulty: 2
    type: numeric
    prompt: "A real walk is {real_km} km. On a map with scale {scale_text}, how many cm would that be on the map?"
    parameters:
      scale:
        gen: map_scale
      scale_text:
        gen: from_object
        object: scale
        field: text
      real_km:
        gen: decimal
        range: { min: 0.5, max: 10.0 }
        dp: 1
    assets:
      - kind: scale_bar
        id: scalebar2
        ratio_from: scale.ratio
    marking:
      mode: numeric_tolerance
      tolerance: 0.1
    solution:
      steps:
        - "Convert km to cm."
        - "Use the ratio to find the map distance."
    calculator: basic

  # ============================================================
  # MAP / GRID REFERENCE QUESTIONS  (4 templates)
  # ============================================================

  - id: geog_compass_direction_v1
    subject: geography
    unit: maps
    skill: geog.maps.compass_points
    difficulty: 1
    type: multi_choice
    prompt: "On the map, what direction is {to_feature} from {from_feature}?"
    parameters:
      map:
        gen: grid_map_with_features
        grid_size: 8
        feature_count: 5
        feature_names: ["Farm", "Bridge", "School", "Wood", "Lake"]
      from_feature:
        gen: pick_one
        from: map.feature_names
      to_feature:
        gen: pick_one_distinct
        from: map.feature_names
        not_equal_to: from_feature
      distractors:
        gen: compass_direction_mcq
        map_ref: map
        from_name: from_feature
        to_name: to_feature
    assets:
      - kind: map_grid
        id: map1
        map_from: map
      - kind: compass_rose
        id: compass1
    marking:
      mode: mcq
    solution:
      steps:
        - "Find {from_feature} and {to_feature} on the map."
        - "Move from {from_feature} towards {to_feature} and decide the compass direction."

  - id: geog_gridref_4fig_v1
    subject: geography
    unit: maps
    skill: geog.maps.gridref_4fig
    difficulty: 2
    type: short_text
    prompt: "Give the 4-figure grid reference for {feature_name}."
    parameters:
      map:
        gen: grid_map_with_features
        grid_size: 8
        feature_count: 6
        feature_names: ["Cave", "Hut", "Waterfall", "Tower", "Camp", "Beach"]
      feature_name:
        gen: pick_one
        from: map.feature_names
    assets:
      - kind: map_grid
        id: map2
        map_from: map
    marking:
      mode: gridref_4fig
    solution:
      steps:
        - "Go along the corridor first (eastings) — read across."
        - "Then go up the stairs (northings) — read up."
        - "Write the two-digit easting then the two-digit northing."

  - id: geog_gridref_6fig_v1
    subject: geography
    unit: maps
    skill: geog.maps.gridref_6fig
    difficulty: 3
    type: short_text
    prompt: "Give the 6-figure grid reference for {feature_name}."
    parameters:
      map:
        gen: grid_map_with_features
        grid_size: 8
        feature_count: 6
        feature_names: ["Tree", "Rock", "Old Well", "Bridge", "Jetty", "Lighthouse"]
        precise: true
      feature_name:
        gen: pick_one
        from: map.feature_names
    assets:
      - kind: map_grid
        id: map3
        map_from: map
        show_tenths: true
    marking:
      mode: gridref_6fig
    solution:
      steps:
        - "Find the 4-figure square first."
        - "Estimate tenths across (easting) then tenths up (northing)."
        - "Write 3 digits for easting then 3 digits for northing."

  - id: geog_bearings_v1
    subject: geography
    unit: maps
    skill: geog.maps.bearings
    difficulty: 3
    type: numeric
    prompt: "What is the bearing of {to_feature} from {from_feature}? Give a 3-digit bearing."
    parameters:
      map:
        gen: grid_map_with_features
        grid_size: 8
        feature_count: 5
        feature_names: ["Start", "Bridge", "Hill", "Village", "Forest"]
      from_feature:
        gen: pick_one
        from: map.feature_names
      to_feature:
        gen: pick_one_distinct
        from: map.feature_names
        not_equal_to: from_feature
    assets:
      - kind: map_grid
        id: map4
        map_from: map
      - kind: compass_rose
        id: compass2
        show_degrees: true
    marking:
      mode: bearing_3digit
      tolerance_degrees: 2
    solution:
      steps:
        - "Place north at the start point."
        - "Measure clockwise from north to the line between the points."
        - "Write as 3 digits (e.g. 065)."

  # ============================================================
  # CONTOUR QUESTIONS  (3 templates)
  # ============================================================

  - id: geog_contours_height_point_v1
    subject: geography
    unit: maps
    skill: geog.maps.contours_height
    difficulty: 3
    type: numeric
    prompt: "Look at the contour map. Estimate the height at point P in metres."
    parameters:
      contour_map:
        gen: synthetic_contour_map
        style: hill
      point_p:
        gen: from_object
        object: contour_map
        field: marked_point
    assets:
      - kind: contours
        id: contours1
        contour_data_from: contour_map
    marking:
      mode: numeric_tolerance
      tolerance: 8
    solution:
      steps:
        - "Find the nearest contour lines around P."
        - "Use the contour interval to estimate between them."

  - id: geog_contours_shape_identify_v1
    subject: geography
    unit: maps
    skill: geog.maps.landform_shape
    difficulty: 3
    type: multi_choice
    prompt: "Which statement best describes the land at point P?"
    parameters:
      contour_map:
        gen: synthetic_contour_map
        style: landform
      distractors:
        gen: from_object
        object: contour_map
        field: mcq
    assets:
      - kind: contours
        id: contours2
        contour_data_from: contour_map
    marking:
      mode: mcq
    solution:
      steps:
        - "Close contours mean a steep slope."
        - "Wide spacing means a gentle slope."
        - "V-shapes often show valleys (pointing uphill)."

  - id: geog_cross_section_choose_v1
    subject: geography
    unit: maps
    skill: geog.maps.cross_section
    difficulty: 4
    type: multi_choice
    prompt: "A line A–B is drawn across the contour map. Which cross-section is correct?"
    parameters:
      contour_map:
        gen: synthetic_contour_map
        style: cross_section
      distractors:
        gen: from_object
        object: contour_map
        field: mcq
    assets:
      - kind: contours
        id: contours3
        contour_data_from: contour_map
      - kind: cross_section_set
        id: xs1
        contour_data_from: contour_map
    marking:
      mode: mcq
    solution:
      steps:
        - "Where contours are close, the cross-section is steep."
        - "Where contours are far apart, the cross-section is gentle."
        - "Match peaks and valleys along A–B."

  # ============================================================
  # CLIMATE GRAPH QUESTIONS  (3 templates)
  # ============================================================

  - id: geog_climograph_read_v1
    subject: geography
    unit: climate
    skill: geog.climate.climograph_read
    difficulty: 3
    type: numeric
    prompt: "Look at the climate graph. What is the total annual rainfall (mm)?"
    parameters:
      climate:
        gen: climograph_dataset
        climate_type: random
    assets:
      - kind: climograph
        id: clim1
        climate_from: climate
    marking:
      mode: numeric_tolerance
      tolerance: 2
    solution:
      steps:
        - "Add the rainfall bars for all 12 months."

  - id: geog_climograph_range_v1
    subject: geography
    unit: climate
    skill: geog.climate.climograph_read
    difficulty: 3
    type: numeric
    prompt: "Look at the climate graph. What is the annual temperature range (°C)?"
    parameters:
      climate:
        gen: climograph_dataset
        climate_type: random
    assets:
      - kind: climograph
        id: clim2
        climate_from: climate
    marking:
      mode: numeric_tolerance
      tolerance: 0.5
    solution:
      steps:
        - "Find the highest monthly temperature."
        - "Find the lowest monthly temperature."
        - "Subtract to get the range."

  - id: geog_climate_compare_v1
    subject: geography
    unit: climate
    skill: geog.climate.compare
    difficulty: 4
    type: multi_choice
    prompt: "Two climate graphs are shown. Which location is more likely to be tropical, and why?"
    parameters:
      climate_a:
        gen: climograph_dataset
        climate_type: temperate
      climate_b:
        gen: climograph_dataset
        climate_type: tropical
      distractors:
        gen: climate_compare_mcq
        a_ref: climate_a
        b_ref: climate_b
    assets:
      - kind: climograph
        id: climA
        climate_from: climate_a
        title: "Location A"
      - kind: climograph
        id: climB
        climate_from: climate_b
        title: "Location B"
    marking:
      mode: mcq
    solution:
      steps:
        - "Tropical climates have warm temperatures all year."
        - "Look for higher rainfall or clear wet/dry seasons."

  # ============================================================
  # WEATHER DIAGRAM QUESTIONS  (2 templates)
  # ============================================================

  - id: geog_pressure_isobars_wind_v1
    subject: geography
    unit: weather
    skill: geog.weather.pressure_systems
    difficulty: 3
    type: multi_choice
    prompt: "Look at the pressure map. Where will the wind be strongest?"
    parameters:
      chart:
        gen: isobar_chart_data
      distractors:
        gen: from_object
        object: chart
        field: mcq
    assets:
      - kind: synoptic_chart
        id: syn1
        chart_from: chart
    marking:
      mode: mcq
    solution:
      steps:
        - "Wind is strongest where isobars are closest together."

  - id: geog_rainfall_types_diagram_v1
    subject: geography
    unit: weather
    skill: geog.weather.rainfall_types
    difficulty: 3
    type: multi_choice
    prompt: "Identify the type of rainfall shown in the diagram."
    parameters:
      rainfall:
        gen: rainfall_diagram_data
      distractors:
        gen: from_object
        object: rainfall
        field: mcq
    assets:
      - kind: rainfall_diagram
        id: rain1
        rainfall_from: rainfall
    marking:
      mode: mcq
    solution:
      steps:
        - "Relief: air forced over hills."
        - "Convectional: sun heats ground, warm air rises."
        - "Frontal: warm and cold air meet."

  # ============================================================
  # MINSTERWORTH OS MAP STUDY  (18 templates)
  # ============================================================
  # All questions use the same real OS map image of Minsterworth.
  # Answers are fixed (no random generation).

  # ── Q1: Compass direction — river runs roughly ────────────
  - id: minsterworth_compass_river_v1
    subject: geography
    unit: maps
    skill: geog.maps.compass_points
    difficulty: 1
    type: multi_choice
    prompt: "Look at the map. The River Severn runs roughly in which direction through the area shown?"
    parameters:
      distractors:
        gen: fixed
        value:
          correct: "South-west to North-east"
          distractors:
            - "North to South"
            - "East to West"
            - "South-east to North-west"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: mcq
    solution:
      steps:
        - "Follow the course of the River Severn on the map."
        - "It flows roughly from the south-west corner to the north-east."

  # ── Q2: Compass direction — Minsterworth from river ───────
  - id: minsterworth_compass_village_v1
    subject: geography
    unit: maps
    skill: geog.maps.compass_points
    difficulty: 1
    type: multi_choice
    prompt: "In which direction is the village of Minsterworth from the River Severn?"
    parameters:
      distractors:
        gen: fixed
        value:
          correct: "South"
          distractors:
            - "North"
            - "East"
            - "West"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: mcq
    solution:
      steps:
        - "Find the village of Minsterworth on the map."
        - "The River Severn is to the north of the village, so Minsterworth is south of the river."

  # ── Q3: Compass direction — Clay Hill from village ────────
  - id: minsterworth_compass_clayhill_v1
    subject: geography
    unit: maps
    skill: geog.maps.compass_points
    difficulty: 2
    type: multi_choice
    prompt: "In which direction is Clay Hill from the village of Minsterworth?"
    parameters:
      distractors:
        gen: fixed
        value:
          correct: "East"
          distractors:
            - "West"
            - "North"
            - "South-west"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: mcq
    solution:
      steps:
        - "Find Minsterworth village and then Clay Hill on the map."
        - "Clay Hill is to the east of the village."

  # ── Q4: Symbol reading — footbridge ──────────────────────
  - id: minsterworth_symbol_fb_v1
    subject: geography
    unit: maps
    skill: geog.maps.map_symbols
    difficulty: 2
    type: multi_choice
    prompt: "The map shows the letters 'FB' near a watercourse. What does 'FB' stand for?"
    parameters:
      distractors:
        gen: fixed
        value:
          correct: "Foot Bridge"
          distractors:
            - "Fire Brigade"
            - "Farm Building"
            - "Flood Barrier"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: mcq
    solution:
      steps:
        - "FB is a standard OS map abbreviation for Foot Bridge."
        - "It shows where a small bridge allows pedestrians to cross a stream."

  # ── Q5: Symbol reading — Sch ─────────────────────────────
  - id: minsterworth_symbol_sch_v1
    subject: geography
    unit: maps
    skill: geog.maps.map_symbols
    difficulty: 1
    type: multi_choice
    prompt: "What does the abbreviation 'Sch' on the map stand for?"
    parameters:
      distractors:
        gen: fixed
        value:
          correct: "School"
          distractors:
            - "Scheduled monument"
            - "Shelter"
            - "Shrine"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: mcq
    solution:
      steps:
        - "'Sch' is the standard OS abbreviation for School."

  # ── Q6: Human vs physical feature ────────────────────────
  - id: minsterworth_features_v1
    subject: geography
    unit: maps
    skill: geog.maps.features_realmap
    difficulty: 2
    type: multi_choice
    prompt: "Which of these is a HUMAN feature shown on the map?"
    parameters:
      distractors:
        gen: fixed
        value:
          correct: "School"
          distractors:
            - "River Severn"
            - "Clayhill Wood"
            - "Long Brook"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: mcq
    solution:
      steps:
        - "Human features are built or made by people (e.g. school, road, farm)."
        - "Physical features are natural (e.g. river, hill, wood)."
        - "The school is a human feature; the river, wood, and brook are physical."

  # ── Q7: Identify woodland ────────────────────────────────
  - id: minsterworth_woodland_v1
    subject: geography
    unit: maps
    skill: geog.maps.identify_realmap
    difficulty: 2
    type: short_text
    prompt: "Name the area of woodland shown on the eastern side of the map."
    parameters:
      correct_value:
        gen: fixed
        value: "Clayhill Wood"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: exact_text_normalised
    solution:
      steps:
        - "Look at the eastern side of the map for the green shading that represents woodland."
        - "The name 'Clayhill Wood' is printed on the map."

  # ── Q8: Identify watercourse ─────────────────────────────
  - id: minsterworth_watercourse_v1
    subject: geography
    unit: maps
    skill: geog.maps.identify_realmap
    difficulty: 2
    type: short_text
    prompt: "Name the small stream (watercourse) that flows through grid square 7717."
    parameters:
      correct_value:
        gen: fixed
        value: "Long Brook"
    assets:
      - kind: map_image
        id: map
        src: /images/minsterworth_map.png
        alt: "OS map extract of Minsterworth"
    marking:
      mode: exact_text_normalised
    solution:
      steps:
        - "Find grid square 7717 on the map."
        - "The blue line running through it is labelled 'Long Brook'."

  # ── Q9: Transport feature ───────────────────────────────
  - id: minsterworth_transport_v1
    subject: geography
    unit: maps
    skill: geog.maps.transport_realmap
    difficulty: 1
    type: multi_choice
    prompt: "What is the name or number of the main road running through Minsterworth?"
    parameters:
      distractors:
        gen: fixed
        value:
