<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Revise Quest{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Fantasy palette
            'realm-purple': { 50: '#f5f0ff', 100: '#ede5ff', 200: '#d4c4ff', 300: '#b89aff', 400: '#9a6aff', 500: '#7c3aed', 600: '#6d28d9', 700: '#5b21b6', 800: '#4c1d95', 900: '#3b0f7a' },
            'realm-gold':   { 50: '#fff9eb', 100: '#fef0c7', 200: '#fdd889', 400: '#f6b935', 500: '#f59e0b', 600: '#d97706' },
            'realm-green':  { 50: '#ecfdf5', 100: '#d1fae5', 400: '#34d399', 500: '#10b981', 600: '#059669' },
          },
          fontFamily: {
            quest: ['"Segoe UI"', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .quest-glow { box-shadow: 0 0 20px var(--tier-glow, rgba(124, 58, 237, 0.3)); }
    .gold-shimmer { animation: shimmer 2s ease-in-out infinite; }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    .tier-accent { color: var(--tier-accent, #a78bfa); }
    .tier-badge { background: var(--tier-badge-bg, rgba(167,139,250,0.2)); color: var(--tier-badge-text, #a78bfa); }
    .tier-glow { box-shadow: 0 0 25px var(--tier-glow, rgba(124,58,237,0.3)); }
    .tier-border { border-color: var(--tier-accent, #a78bfa); }
    .tier-progress-bar { background: var(--tier-accent, #a78bfa); }

    /* ── Professor Quill / Bunny Avatar System ── */
    .quill-avatar {
      border-radius: 50%;
      border: 2px solid rgba(251, 191, 36, 0.5);
      box-shadow: 0 0 12px rgba(251, 191, 36, 0.2);
      object-fit: cover;
      flex-shrink: 0;
    }
    .quill-sm { width: 48px; height: 48px; }
    .quill-md { width: 80px; height: 80px; }
    .quill-lg { width: 120px; height: 120px; }
    .quill-bounce-in {
      animation: quillBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes quillBounce {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); }
    }
    .bunny-sparkle {
      animation: quillBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both,
                 bunnyGlow 1.5s ease-in-out 0.5s 2;
    }
    @keyframes bunnyGlow {
      0%, 100% { box-shadow: 0 0 12px rgba(251, 191, 36, 0.2); }
      50% { box-shadow: 0 0 25px rgba(236, 72, 153, 0.5), 0 0 40px rgba(251, 191, 36, 0.3); }
    }
    /* Speech bubble */
    .quill-speech {
      position: relative;
      background: rgba(76, 29, 149, 0.7);
      border: 1px solid rgba(154, 106, 255, 0.4);
      border-radius: 1rem;
      padding: 0.75rem 1rem;
    }
    .quill-speech::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 50%;
      transform: translateY(-50%);
      border-width: 8px 8px 8px 0;
      border-style: solid;
      border-color: transparent rgba(154, 106, 255, 0.4) transparent transparent;
    }
  </style>
  {% block head %}{% endblock %}
</head>
{# Tier-driven dynamic background — falls back to default purple if user not set #}
{% if user is defined and user %}
  {% set _tier = get_tier(user.xp) %}
  <body class="min-h-screen text-white font-quest"
        style="background: linear-gradient(135deg, {{ _tier.gradient_from }}, {{ _tier.gradient_via }}, {{ _tier.gradient_to }});
               --tier-accent: {{ _tier.accent }};
               --tier-glow: {{ _tier.glow }};
               --tier-badge-bg: {{ _tier.badge_bg }};
               --tier-badge-text: {{ _tier.badge_text }};">
{% else %}
  <body class="min-h-screen bg-gradient-to-br from-realm-purple-900 via-realm-purple-800 to-indigo-900 text-white font-quest">
{% endif %}
  {% block body %}{% endblock %}

  {% block scripts %}{% endblock %}

  <script>
    // HTMX: show friendly toast on server errors
    document.body.addEventListener('htmx:responseError', function(e) {
      var toast = document.getElementById('htmx-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'htmx-toast';
        toast.className = 'fixed bottom-4 right-4 bg-red-600 text-white px-4 py-3 rounded-xl shadow-lg z-50 transition-opacity duration-500';
        document.body.appendChild(toast);
      }
      toast.textContent = '⚠️ Something went wrong. Please try again!';
      toast.style.opacity = '1';
      setTimeout(function() { toast.style.opacity = '0'; }, 4000);
    });

    /* ── Quill / Bunny avatar helper ── */
    var BUNNY_CHANCE = 0.15; // ~15% chance for bunny Easter egg
    var BUNNY_ELIGIBLE = ['waving','thumbsup','reading','proud','encouraging','celebrating'];

    /**
     * Build an <img> tag for Professor Quill (or a surprise bunny).
     * @param {string} pose - e.g. 'thinking', 'teaching1', 'thumbsup'
     * @param {string} size - 'sm', 'md', 'lg'
     * @returns {string} HTML string
     */
    function quillImg(pose, size) {
      size = size || 'md';
      var isBunny = BUNNY_ELIGIBLE.indexOf(pose) !== -1 && Math.random() < BUNNY_CHANCE;
      var src = isBunny ? '/images/bunny_' + pose + '.png' : '/images/quill_' + pose + '.png';
      var alt = isBunny ? "Anna's Bunny Friend" : 'Professor Quill';
      var cls = isBunny ? 'quill-avatar quill-' + size + ' bunny-sparkle'
                        : 'quill-avatar quill-' + size + ' quill-bounce-in';
      return '<img src="' + src + '" alt="' + alt + '" class="' + cls + '"' +
             ' loading="lazy" onerror="this.style.display=\'none\'">';
    }
  </script>
</body>
</html>
